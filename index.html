<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Task Tracker</title>
</head>
<body>
<header>
  <h1>Task Tracker</h1>
</header>

<main>
  <aside id="sidebar">
    <!-- sidebar content will go here later -->
    <h2>Summary</h2>
    <figure>
      <progress id="progress-bar" max="100" value="0"></progress>
      <figcaption>Completion rate</figcaption>
    </figure>

    <details>
      <summary>Tips</summary>
      <p>Break large tasks into smaller, manageable steps.</p>
      <p>Tackle your hardest task first while your energy is high.</p>
      <p>Mark tasks done immediately so your progress stays accurate.</p>
    </details>
  </aside>

  <section id="task-area">
    <!-- task content will go here later -->
    <form id="task-form">

      <input type="text" id="task-input" placeholder="Task name..." required>

      <select id="priority-select">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <button type="submit">Add Task</button>

    </form>

    <table id="task-table">

      <thead>
      <tr>
        <th>Task</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody id="task-body">
      <!-- JavaScript will add rows here -->
      </tbody>

    </table>
  </section>

  </main>
</body>
</html>
